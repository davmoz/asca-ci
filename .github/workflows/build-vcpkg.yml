name: Build with vcpkg

on:
  push:
    branches:
      - master
      - main
      - v*

    tags:
      - v*

    paths:
      - cmake/**
      - src/**
      - CMakeLists.txt
      - vcpkg.json

  pull_request:
    paths:
      - cmake/**
      - src/**
      - CMakeLists.txt
      - vcpkg.json

jobs:
  job:
    name: ${{ matrix.os }}-${{ matrix.cxx }}-${{ matrix.buildtype }}-luajit=${{ matrix.luajit }}
    runs-on: ${{ matrix.os }}-latest
    strategy:
      fail-fast: false
      max-parallel: 8
      matrix:
        name: [ubuntu-gcc, ubuntu-clang, macos-clang, windows-msvc]
        buildtype: [Debug, Release]
        luajit: [on, off]
        include:
          - name: windows-msvc
            os: windows
            cxx: cl.exe
            cc: cl.exe
            triplet: x64-windows
          - name: ubuntu-gcc
            os: ubuntu
            cxx: g++
            cc: gcc
            triplet: x64-linux
          - name: ubuntu-clang
            os: ubuntu
            cxx: clang++
            cc: clang
            triplet: x64-linux
          - name: macos-clang
            os: macos
            cxx: clang++
            cc: clang
            triplet: x64-osx

    env:
      VCPKG_DEFAULT_TRIPLET: ${{ matrix.triplet }}

    steps:
      - uses: actions/checkout@v4

      - name: Get latest CMake
        uses: lukka/get-cmake@latest

      - name: Ubuntu - install luajit
        run: sudo apt-get update && sudo apt-get install -y libluajit-5.1-dev
        if: contains( matrix.os, 'ubuntu')

      - name: MacOS - install luajit pkgconfig
        run: brew install luajit pkgconfig
        if: contains( matrix.os, 'macos')

      - name: Windows - remove C:/mysql*
        run: rm -r -fo C:/mysql-5.7.21-winx64
        if: contains( matrix.os, 'windows')
        continue-on-error: true

      - name: Run vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: 62159a45e18f3a9ac0548628dcaf74fcb60c6ff9

      - name: Configure CMake
        run: >
          cmake -B ${{ runner.workspace }}/build
          -DCMAKE_BUILD_TYPE=${{ matrix.buildtype }}
          -DUSE_LUAJIT=${{ matrix.luajit }}
          -DCMAKE_TOOLCHAIN_FILE=${{ env.VCPKG_ROOT }}/scripts/buildsystems/vcpkg.cmake
        shell: bash
        env:
          CXX: ${{ matrix.cxx }}
          CC: ${{ matrix.cc }}

      - name: Build
        run: cmake --build ${{ runner.workspace }}/build --config ${{ matrix.buildtype }}
        shell: bash

      - name: Upload artifact binary
        uses: actions/upload-artifact@v4
        with:
          name: tfs-${{ matrix.name }}-${{ matrix.buildtype }}-luajit=${{ matrix.luajit }}-${{ github.sha }}
          path: ${{ runner.workspace }}/build/tfs
        if: "! contains( matrix.os, 'windows')"

      - name: Upload artifact binary (exe)
        uses: actions/upload-artifact@v4
        with:
          name: tfs-${{ matrix.name }}-${{ matrix.buildtype }}-luajit=${{ matrix.luajit }}-${{ github.sha }}
          path: ${{ runner.workspace }}/build/${{ matrix.buildtype }}/tfs.exe
        if: contains( matrix.os, 'windows')
